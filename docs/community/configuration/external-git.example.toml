# External Git provider registry. This file contains public configuration only.
# Secrets are injected separately; see docs/community/configuration/external-git.md.
schema = 1

[[providers]]
id = "gitlab"
kind = "gitlab"
brand = "gitlab"
display_name = "GitLab"
base_url = "https://gitlab.example.com"
api_url = "https://gitlab.example.com/api/v4"
client_id = "replace-with-gitlab-oauth-application-id"
redirect_uri = "https://typst.example.com/v1/external-git/providers/gitlab/callback"
login_enabled = true

[[providers]]
id = "github"
kind = "github"
brand = "github"
display_name = "GitHub"
base_url = "https://github.com"
api_url = "https://api.github.com"
app_slug = "typst-collaboration"
client_id = "replace-with-github-app-client-id"
redirect_uri = "https://typst.example.com/v1/external-git/providers/github/callback"
login_enabled = true

# Gitea 1.23 or newer uses the shared Forge API family with an explicit Gitea
# dialect. Each self-hosted instance has its own provider ID and OAuth app.
[[providers]]
id = "gitea"
kind = "gitea"
brand = "gitea"
display_name = "Gitea"
base_url = "https://git.example.com"
api_url = "https://git.example.com/api/v1"
client_id = "replace-with-gitea-oauth-application-id"
redirect_uri = "https://typst.example.com/v1/external-git/providers/gitea/callback"
login_enabled = true

# Codeberg is a branded Forgejo instance. A self-hosted Forgejo uses the same
# adapter with brand = "forgejo" and its own URLs and provider ID.
[[providers]]
id = "codeberg"
kind = "forgejo"
brand = "codeberg"
display_name = "Codeberg"
base_url = "https://codeberg.org"
api_url = "https://codeberg.org/api/v1"
client_id = "replace-with-codeberg-oauth-application-id"
redirect_uri = "https://typst.example.com/v1/external-git/providers/codeberg/callback"
login_enabled = true
