name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout with Typst documentation source
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: |
            protocol/package-lock.json
            web/package-lock.json

      - name: Prepare static web checks
        run: |
          npm --prefix protocol ci
          npm --prefix web ci

      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build and test Pages artifact
        env:
          TOSS_BASE_URL: ${{ format('{0}/', steps.pages.outputs.base_path) }}
        run: scripts/ci/web-static.sh

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
