name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      classification: ${{ steps.classify.outputs.classification }}
      backend: ${{ steps.classify.outputs.backend }}
      container: ${{ steps.classify.outputs.container }}
      workers: ${{ steps.classify.outputs.workers }}
      web: ${{ steps.classify.outputs.web }}
      web_static: ${{ steps.classify.outputs.web_static }}
      integration: ${{ steps.classify.outputs.integration }}
    steps:
      - name: Checkout change history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"

      - name: Select CI domains
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            selection="$(node scripts/ci/changed-domains.mjs --all)"
          else
            selection="$(
              git diff --no-renames --name-only -z "$BASE_SHA...$HEAD_SHA" |
                node scripts/ci/changed-domains.mjs
            )"
          fi

          printf '%s\n' "$selection"
          printf '%s\n' "$selection" >> "$GITHUB_OUTPUT"

  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout with compiler provenance
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: protocol/package-lock.json

      - name: Cache verified BusyTeX runtime
        uses: actions/cache@v6
        with:
          path: prebuilt/busytex/package
          key: busytex-runtime-${{ hashFiles('prebuilt/busytex/build-manifest.json') }}

      - name: Run preflight checks
        run: scripts/ci/preflight.sh

  backend:
    name: backend
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: typstapp
          POSTGRES_PASSWORD: community-ci
          POSTGRES_DB: typstappdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U typstapp -d typstappdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://typstapp:community-ci@127.0.0.1:5432/typstappdb
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy

      - name: Cache backend Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
          shared-key: backend
          cache-on-failure: true

      - name: Run backend checks
        run: scripts/ci/backend.sh

      - name: Prepare Core integration artifact
        run: |
          mkdir -p "$RUNNER_TEMP/core-api"
          cp backend/target/debug/core-api "$RUNNER_TEMP/core-api/core-api"
          strip "$RUNNER_TEMP/core-api/core-api"

      - name: Upload Core integration artifact
        uses: actions/upload-artifact@v7
        with:
          name: core-api
          path: ${{ runner.temp }}/core-api/core-api
          if-no-files-found: error
          retention-days: 1

  container:
    name: container
    needs:
      - changes
      - preflight
    if: ${{ needs.changes.outputs.container == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: typstapp
          POSTGRES_PASSWORD: community-container-ci
          POSTGRES_DB: typstappdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U typstapp -d typstappdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://typstapp:community-container-ci@127.0.0.1:5432/typstappdb
      CORE_API_PORT: "18080"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Community application image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          target: runtime-source
          build-args: TOSS_DISTRIBUTION=community
          load: true
          push: false
          tags: toss-community:ci
          provenance: false
          cache-from: type=gha,scope=community-core-image
          cache-to: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && 'type=gha,mode=max,scope=community-core-image' || '' }}

      - name: Smoke Community application image
        env:
          CONTAINER_IMAGE: toss-community:ci
        run: scripts/ci/core-image-smoke.sh

  workers:
    name: workers
    needs: changes
    if: ${{ needs.changes.outputs.workers == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy

      - name: Cache worker Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workers -> target
          shared-key: workers
          cache-on-failure: true

      - name: Run worker checks
        run: scripts/ci/workers.sh

  web:
    name: web
    needs:
      - changes
      - preflight
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: |
            protocol/package-lock.json
            web/package-lock.json

      - name: Restore verified BusyTeX runtime
        uses: actions/cache@v6
        with:
          path: prebuilt/busytex/package
          key: busytex-runtime-${{ hashFiles('prebuilt/busytex/build-manifest.json') }}

      - name: Run web checks
        run: scripts/ci/web.sh

      - name: Package web integration artifact
        run: tar --exclude='*.gz' -czf "$RUNNER_TEMP/web-dist.tar.gz" -C web dist

      - name: Upload web integration artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: ${{ runner.temp }}/web-dist.tar.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  web_static:
    name: web-static
    needs:
      - changes
      - preflight
    if: ${{ needs.changes.outputs.web_static == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: |
            protocol/package-lock.json
            web/package-lock.json

      - name: Prepare static web checks
        run: |
          npm --prefix protocol ci
          npm --prefix web ci

      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run static web checks
        env:
          TOSS_BASE_URL: /TOSS/
          TOSS_BROWSER_ENABLED_FEATURES: ai_assistant
        run: scripts/ci/web-static.sh

  integration:
    name: integration
    needs:
      - changes
      - preflight
      - backend
      - web
    if: ${{ needs.changes.outputs.integration == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: typstapp
          POSTGRES_PASSWORD: community-ci
          POSTGRES_DB: typstappdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U typstapp -d typstappdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://typstapp:community-ci@127.0.0.1:5432/typstappdb
      CORE_API_PORT: "18080"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install browser test tooling
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Download Core integration artifact
        uses: actions/download-artifact@v8
        with:
          name: core-api
          path: ${{ runner.temp }}/core-api

      - name: Download web integration artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: ${{ runner.temp }}/web-dist

      - name: Prepare integration artifacts
        run: |
          chmod +x "$RUNNER_TEMP/core-api/core-api"
          tar -xzf "$RUNNER_TEMP/web-dist/web-dist.tar.gz" -C web

      - name: Run integration checks
        env:
          CORE_API_BIN: ${{ runner.temp }}/core-api/core-api
          WEB_STATIC_DIR: ${{ github.workspace }}/web/dist
        run: scripts/ci/integration.sh

  checks:
    name: checks
    if: ${{ always() }}
    needs:
      - changes
      - preflight
      - backend
      - container
      - workers
      - web
      - web_static
      - integration
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require selected CI domains
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          BACKEND_SELECTED: ${{ needs.changes.outputs.backend }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          CONTAINER_SELECTED: ${{ needs.changes.outputs.container }}
          CONTAINER_RESULT: ${{ needs.container.result }}
          WORKERS_SELECTED: ${{ needs.changes.outputs.workers }}
          WORKERS_RESULT: ${{ needs.workers.result }}
          WEB_SELECTED: ${{ needs.changes.outputs.web }}
          WEB_RESULT: ${{ needs.web.result }}
          WEB_STATIC_SELECTED: ${{ needs.changes.outputs.web_static }}
          WEB_STATIC_RESULT: ${{ needs.web_static.result }}
          INTEGRATION_SELECTED: ${{ needs.changes.outputs.integration }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
        run: |
          set -euo pipefail

          if [[ "$CHANGES_RESULT" != "success" || "$PREFLIGHT_RESULT" != "success" ]]; then
            echo "CI setup failed: changes=$CHANGES_RESULT preflight=$PREFLIGHT_RESULT" >&2
            exit 1
          fi

          require_selected() {
            local name="$1"
            local selected="$2"
            local result="$3"

            case "$selected" in
              true)
                if [[ "$result" != "success" ]]; then
                  echo "Selected CI job did not succeed: $name=$result" >&2
                  return 1
                fi
                ;;
              false)
                ;;
              *)
                echo "Invalid CI selection for $name: $selected" >&2
                return 1
                ;;
            esac
          }

          require_selected backend "$BACKEND_SELECTED" "$BACKEND_RESULT"
          require_selected container "$CONTAINER_SELECTED" "$CONTAINER_RESULT"
          require_selected workers "$WORKERS_SELECTED" "$WORKERS_RESULT"
          require_selected web "$WEB_SELECTED" "$WEB_RESULT"
          require_selected web-static "$WEB_STATIC_SELECTED" "$WEB_STATIC_RESULT"
          require_selected integration "$INTEGRATION_SELECTED" "$INTEGRATION_RESULT"
