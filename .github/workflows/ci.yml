name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: typstapp
          POSTGRES_PASSWORD: community-ci
          POSTGRES_DB: typstappdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U typstapp -d typstappdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Cache verified browser runtime artifacts
        uses: actions/cache@v6
        with:
          path: |
            prebuilt/typst-compiler/package
            prebuilt/busytex/package
          key: browser-runtime-${{ hashFiles('prebuilt/typst-compiler/build-manifest.json', 'prebuilt/typst-compiler/artifact.json', 'prebuilt/busytex/build-manifest.json') }}

      - name: Install Playwright Chromium
        run: |
          cd web
          npm ci
          npx playwright install --with-deps chromium

      - name: Run CI checks
        env:
          DATABASE_URL: postgres://typstapp:community-ci@127.0.0.1:5432/typstappdb
          CORE_API_PORT: "18080"
        run: |
          chmod +x scripts/ci-checks.sh
          scripts/ci-checks.sh
